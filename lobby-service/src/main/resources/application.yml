server:
  port: 8084

spring:
  application:
    name: lobby-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: false

game:
  service:
    url: http://${GAME_SERVICE_HOST:game-service}:8083

wallet:
  service:
    url: http://${WALLET_SERVICE_HOST:wallet-service}:8082

auth:
  service:
    url: http://${AUTH_SERVICE_HOST:auth-service}:8081

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token}

logging:
  level:
    ru.meowmure.lobby: INFO
    ru.meowmure.game.client: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
