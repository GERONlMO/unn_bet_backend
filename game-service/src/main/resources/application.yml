server:
  port: 8083

spring:
  application:
    name: game-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
      properties:
        request.timeout.ms: 5000
        delivery.timeout.ms: 10000

wallet:
  service:
    url: http://${WALLET_SERVICE_HOST:wallet-service}:8082

auth:
  service:
    url: http://${AUTH_SERVICE_HOST:auth-service}:8081

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token}

logging:
  level:
    ru.meowmure.game: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
