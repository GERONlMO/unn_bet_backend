databaseChangeLog:
  - changeSet:
      id: "wallet-wallets-v1"
      author: "unn-bet"
      validCheckSum: ANY
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: wallets
      changes:
        - createTable:
            tableName: wallets
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: balance
                  type: BIGINT