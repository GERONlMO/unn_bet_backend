server:
  port: 8080

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: http://${AUTH_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - AuthenticationFilter
        - id: profile-service
          uri: http://${AUTH_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/profile/**
          filters:
            - AuthenticationFilter
        - id: wallet-service
          uri: http://${WALLET_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/wallet/**
          filters:
            - AuthenticationFilter
        - id: game-service
          uri: http://${GAME_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/game/**
          filters:
            - AuthenticationFilter
        - id: lobby-service
          uri: http://${LOBBY_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/lobby/**
          filters:
            - AuthenticationFilter
            
jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
