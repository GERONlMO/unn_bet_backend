# Keep at least one pod during voluntary disruptions (node drain, rolling deploy).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gateway-service-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gateway-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lobby-service-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: lobby-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: wallet-service-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: wallet-service
