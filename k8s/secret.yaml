# NOT applied by CI/CD — secrets are managed manually in the cluster.
# Use this file only for initial cluster setup: kubectl apply -f secret.yaml -n default
apiVersion: v1
kind: Secret
metadata:
  name: unn-bet-secrets
type: Opaque
stringData:
  POSTGRES_USER: "unn_user"
  POSTGRES_PASSWORD: "unn_password"
  POSTGRES_DB: "unn_bet_db"
  REDIS_PASSWORD: "change-me"
  KAFKA_USER: "unn_app"
  KAFKA_PASSWORD: "change-me"
  # Deploy Token for unn_bet_integration_test (read_repository)
  GITLAB_INTEGRATION_TEST_CLONE_USER: "change-me"
  GITLAB_INTEGRATION_TEST_CLONE_TOKEN: "change-me"
  # Base64 HS256 key (openssl rand -base64 32); одинаковый для auth-service и gateway-service
  JWT_SECRET: "change-me"
