apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  labels:
    app: gateway-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: gateway-service
      containers:
        - name: gateway-service
          image: cr.yandex/<REGISTRY_ID>/gateway-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
            - name: SPRING_CLOUD_GATEWAY_HTTPCLIENT_RESPONSE_TIMEOUT
              value: "3600s"
            - name: AUTH_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: unn-bet-config
                  key: AUTH_SERVICE_HOST
            - name: WALLET_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: unn-bet-config
                  key: WALLET_SERVICE_HOST
            - name: GAME_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: unn-bet-config
                  key: GAME_SERVICE_HOST
            - name: LOBBY_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: unn-bet-config
                  key: LOBBY_SERVICE_HOST
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: unn-bet-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      name: http
  selector:
    app: gateway-service
