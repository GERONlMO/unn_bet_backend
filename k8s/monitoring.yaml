# Lightweight Prometheus + Alertmanager for UnnBet (no operator required).
# Scrapes Spring Actuator /actuator/prometheus on stateless services.
# Alertmanager UI: kubectl port-forward -n monitoring svc/alertmanager 9093:9093
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
      - job_name: unn-bet-services
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - gateway-service.default.svc.cluster.local:80
              - auth-service.default.svc.cluster.local:8081
              - wallet-service.default.svc.cluster.local:8082
              - game-service.default.svc.cluster.local:8083
              - lobby-service.default.svc.cluster.local:8084
            labels:
              env: prod
  alerts.yml: |
    groups:
      - name: unn-bet-availability
        rules:
          - alert: UnnBetServiceDown
            expr: up{job="unn-bet-services"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "UnnBet service {{ $labels.instance }} is down"
              description: "Prometheus cannot scrape {{ $labels.instance }} for more than 2 minutes."
          - alert: GameServiceDown
            expr: up{job="unn-bet-services", instance="game-service.default.svc.cluster.local:8083"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "game-service is down"
              description: "Poker tables will not work until game-service is restored."
          - alert: GatewayServiceDown
            expr: up{job="unn-bet-services", instance="gateway-service.default.svc.cluster.local:80"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "gateway-service is down"
              description: "All public API traffic is affected."
      - name: unn-bet-errors
        rules:
          - alert: UnnBetHigh5xxRate
            expr: |
              sum by (instance) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
              /
              sum by (instance) (rate(http_server_requests_seconds_count[5m])) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High 5xx rate on {{ $labels.instance }}"
              description: "More than 5% of HTTP responses are 5xx over the last 5 minutes."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: default
      group_by: [alertname, instance]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
    receivers:
      - name: default
        # Add telegram/email/webhook here when notification channel is ready.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - containerPort: 9093
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
