apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  labels:
    app: wallet-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: wallet-service
      containers:
        - name: wallet-service
          image: cr.yandex/<REGISTRY_ID>/wallet-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: unn-bet-config
                  key: POSTGRES_HOST
            - name: KAFKA_HOST
              valueFrom:
                configMapKeyRef:
                  name: unn-bet-config
                  key: KAFKA_HOST
            - name: KAFKA_USER
              valueFrom:
                secretKeyRef:
                  name: unn-bet-secrets
                  key: KAFKA_USER
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unn-bet-secrets
                  key: KAFKA_PASSWORD
            - name: SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL
              value: "SASL_PLAINTEXT"
            - name: SPRING_KAFKA_PROPERTIES_SASL_MECHANISM
              value: "SCRAM-SHA-512"
            - name: SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG
              valueFrom:
                secretKeyRef:
                  name: unn-bet-secrets
                  key: KAFKA_SASL_JAAS_CONFIG
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: unn-bet-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unn-bet-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: unn-bet-secrets
                  key: POSTGRES_DB
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                configMapKeyRef:
                  name: unn-bet-config
                  key: INTERNAL_SERVICE_TOKEN
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      name: http
  selector:
    app: wallet-service
