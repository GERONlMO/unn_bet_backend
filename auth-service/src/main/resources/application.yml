server:
  port: 8081
  tomcat:
    max-http-form-post-size: 3MB
    max-swallow-size: 3MB

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: auth-service
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:6432/unn_bet_db?sslmode=require&targetServerType=primary
    username: ${POSTGRES_USER:unn_user}
    password: ${POSTGRES_PASSWORD:unn_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost:29092}
    consumer:
      group-id: auth-profile-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000} # 1 day

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token}

# Логины, которым при регистрации выдаётся ADMIN (через запятую)
app:
  admin-usernames: ${APP_ADMIN_USERNAMES:admin}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
